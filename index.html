<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baseball Lineup Game Mode</title>
<style>
:root{
  --bg:#f4f6f8; --card:#ffffff; --line:#d8dde6; --text:#13202b; --muted:#5c6b7a;
  --accent:#1f6feb; --accent-soft:#dbeafe; --bench:#fff7db; --sub:#e8f5e9; --sub-line:#9fd3a8;
}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;margin:0;padding:16px;background:var(--bg);color:var(--text)}
h1,h2,h3{margin:0 0 10px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
textarea,input{width:100%;font:inherit;padding:10px;border:1px solid #ccd4de;border-radius:10px;box-sizing:border-box}
textarea{min-height:120px}
.section{margin-top:14px}
.player{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;margin:8px 0;background:#eef3ff;border:2px solid transparent;border-radius:10px}
.player.selected{background:var(--accent-soft);border-color:var(--accent)}
.controls{display:flex;gap:6px;flex-wrap:wrap}
button{font:inherit;padding:8px 12px;border:1px solid #cbd5e1;background:#f3f4f6;border-radius:8px}
.small{font-size:14px;padding:5px 8px}
.muted{color:var(--muted)}
.bench{background:var(--bench);border-radius:10px;padding:8px}
.inline-row{display:flex;gap:8px;align-items:center}
.inline-name{flex:1;min-width:0}
.name-input,.num-input{font:inherit;border:1px solid #ccd4de;border-radius:8px;padding:6px 8px;background:#fff}
.num-input{width:60px}
.name-input{flex:1;min-width:0}
.game-mode{display:none}
body.game .editor-mode{display:none}
body.game .game-mode{display:block}
.game-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.game-header h1{margin:0;font-size:28px;line-height:1.05}
.game-header button{padding:6px 10px}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.game-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px}
.game-team-header{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px}
.game-team-header h2{text-align:center;margin:0}
.sub-btn{position:absolute;right:0;top:50%;transform:translateY(-50%)}
.game-player{width:100%;text-align:left;font:inherit;display:block;padding:14px 16px;margin:8px 0;background:#eef3ff;border:3px solid transparent;border-radius:14px}
.game-player.selected{background:var(--accent-soft);border-color:var(--accent)}
.game-player .num{display:inline-block;min-width:44px;color:var(--muted);font-weight:700}
.game-player .name{font-size:22px;font-weight:700}
.game-bench{margin-top:16px;background:var(--bench);border-radius:14px;padding:12px}
.game-bench-list{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#fff;border:1px solid #d7c98f;border-radius:999px;padding:8px 12px;font-size:15px}
.sub-panel{margin-top:12px;background:var(--sub);border:1px solid var(--sub-line);border-radius:12px;padding:10px}
.sub-option{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#fff;border:1px solid #cde8d1;border-radius:10px;padding:8px 10px;margin-top:8px}
@media (max-width:900px){.grid,.game-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="editor-mode">
<h1>Baseball Lineup Tool</h1>
<p class="muted">Edit team names, rosters, player names, and lineups, then switch to Game Mode.</p>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
  <button id="enterGameMode">Game Mode</button>
</div>

<div class="grid">
  <div class="card">
    <h2>Guest Team</h2>
    <input id="rightName" type="text" value="Guest Team">
    <div style="height:8px"></div>
    <textarea id="rightText">3 Allen
9 Carter
14 Diaz
27 Foster
31 Green</textarea>
    <button id="rightLoad">Load</button>

    <div class="section">
      <h3>Lineup</h3>
      <div id="rightLineup"></div>
    </div>

    <div class="section">
      <h3>Bench</h3>
      <div id="rightBench" class="bench"></div>
    </div>
  </div>

  <div class="card">
    <h2>Home Team</h2>
    <input id="leftName" type="text" value="Home Team">
    <div style="height:8px"></div>
    <textarea id="leftText">12 Smith
8 Martinez
22 Lopez
4 Johnson
17 Perez</textarea>
    <button id="leftLoad">Load</button>

    <div class="section">
      <h3>Lineup</h3>
      <div id="leftLineup"></div>
    </div>

    <div class="section">
      <h3>Bench</h3>
      <div id="leftBench" class="bench"></div>
    </div>
  </div>
</div>
</div>

<div class="game-mode">
  <div class="game-header">
    <h1>Game Mode</h1>
    <button id="exitGameMode">Edit</button>
  </div>

  <div class="game-grid">
    <div class="game-card">
      <div class="game-team-header">
        <h2 id="gameRightTitle">Guest Team</h2>
        <button id="subRightBtn" class="sub-btn small">Sub</button>
      </div>
      <div id="gameRightLineup"></div>
      <div id="subRightPanel"></div>
      <div class="game-bench">
        <h3>Bench</h3>
        <div id="gameRightBench" class="game-bench-list"></div>
      </div>
    </div>

    <div class="game-card">
      <div class="game-team-header">
        <h2 id="gameLeftTitle">Home Team</h2>
        <button id="subLeftBtn" class="sub-btn small">Sub</button>
      </div>
      <div id="gameLeftLineup"></div>
      <div id="subLeftPanel"></div>
      <div class="game-bench">
        <h3>Bench</h3>
        <div id="gameLeftBench" class="game-bench-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
const STORAGE_KEY = "baseball_lineup_game_mode_v6_state";

function parse(text){
  return text.split(/\n/).map(function(l){return l.trim();}).filter(Boolean).map(function(line){
    var p=line.split(" ");
    return {num:p[0] || "",name:p.slice(1).join(" ") || ""};
  });
}

function textOf(p){ return (p.num + " " + p.name).trim(); }

function defaultState(){
  return {
    left:{name:"Home Team",raw:"12 Smith\n8 Martinez\n22 Lopez\n4 Johnson\n17 Perez",lineup:[],bench:[],selected:null,subOpen:false},
    right:{name:"Guest Team",raw:"3 Allen\n9 Carter\n14 Diaz\n27 Foster\n31 Green",lineup:[],bench:[],selected:null,subOpen:false}
  };
}

let state = defaultState();

function saveState(){
  state.left.name = document.getElementById("leftName").value.trim() || "Home Team";
  state.right.name = document.getElementById("rightName").value.trim() || "Guest Team";
  state.left.raw = document.getElementById("leftText").value;
  state.right.raw = document.getElementById("rightText").value;
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

function loadSavedState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    var saved = JSON.parse(raw);
    if(saved && saved.left && saved.right){ state = saved; return true; }
  }catch(e){}
  return false;
}

function rebuildRaw(side){
  state[side].raw = state[side].lineup.concat(state[side].bench).map(textOf).join("\n");
  document.getElementById(side + "Text").value = state[side].raw;
}

function applyStateToInputs(){
  document.getElementById("leftName").value = state.left.name || "Home Team";
  document.getElementById("rightName").value = state.right.name || "Guest Team";
  document.getElementById("leftText").value = state.left.raw || "";
  document.getElementById("rightText").value = state.right.raw || "";
}

function renderSide(side){
  var lineup=document.getElementById(side+"Lineup");
  var bench=document.getElementById(side+"Bench");
  lineup.innerHTML="";
  bench.innerHTML="";

  state[side].lineup.forEach(function(p,i){
    var row=document.createElement("div");
    row.className="player"+(state[side].selected===i?" selected":"");

    var inline=document.createElement("div");
    inline.className="inline-row inline-name";

    var num=document.createElement("input");
    num.className="num-input";
    num.value=p.num;
    num.oninput=function(e){
      p.num=e.target.value;
      rebuildRaw(side);
      renderGame();
      saveState();
    };

    var name=document.createElement("input");
    name.className="name-input";
    name.value=p.name;
    name.oninput=function(e){
      p.name=e.target.value;
      rebuildRaw(side);
      renderGame();
      saveState();
    };

    inline.appendChild(num);
    inline.appendChild(name);
    row.appendChild(inline);

    var c=document.createElement("div");
    c.className="controls";

    var up=document.createElement("button");
    up.className="small";
    up.textContent="↑";
    up.onclick=function(e){
      e.stopPropagation();
      if(i>0){
        var tmp=state[side].lineup[i-1];
        state[side].lineup[i-1]=state[side].lineup[i];
        state[side].lineup[i]=tmp;
        if(state[side].selected===i) state[side].selected=i-1;
        else if(state[side].selected===i-1) state[side].selected=i;
        rebuildRaw(side);
        render();
      }
    };

    var down=document.createElement("button");
    down.className="small";
    down.textContent="↓";
    down.onclick=function(e){
      e.stopPropagation();
      if(i<state[side].lineup.length-1){
        var tmp=state[side].lineup[i+1];
        state[side].lineup[i+1]=state[side].lineup[i];
        state[side].lineup[i]=tmp;
        if(state[side].selected===i) state[side].selected=i+1;
        else if(state[side].selected===i+1) state[side].selected=i;
        rebuildRaw(side);
        render();
      }
    };

    var benchBtn=document.createElement("button");
    benchBtn.className="small";
    benchBtn.textContent="Bench";
    benchBtn.onclick=function(e){
      e.stopPropagation();
      state[side].bench.push(state[side].lineup.splice(i,1)[0]);
      if(state[side].selected===i) state[side].selected=null;
      rebuildRaw(side);
      render();
    };

    c.appendChild(up);
    c.appendChild(down);
    c.appendChild(benchBtn);
    row.appendChild(c);
    row.onclick=function(ev){
      if(ev.target.tagName !== "INPUT"){
        state[side].selected=i;
        render();
      }
    };
    lineup.appendChild(row);
  });

  if(state[side].lineup.length===0){ lineup.innerHTML="<div class='muted'>No lineup players.</div>"; }

  state[side].bench.forEach(function(p,i){
    var row=document.createElement("div");
    row.className="player";

    var inline=document.createElement("div");
    inline.className="inline-row inline-name";

    var num=document.createElement("input");
    num.className="num-input";
    num.value=p.num;
    num.oninput=function(e){
      p.num=e.target.value;
      rebuildRaw(side);
      renderGame();
      saveState();
    };

    var name=document.createElement("input");
    name.className="name-input";
    name.value=p.name;
    name.oninput=function(e){
      p.name=e.target.value;
      rebuildRaw(side);
      renderGame();
      saveState();
    };

    inline.appendChild(num);
    inline.appendChild(name);
    row.appendChild(inline);

    var c=document.createElement("div");
    var play=document.createElement("button");
    play.className="small";
    play.textContent="Play";
    play.onclick=function(){
      state[side].lineup.push(state[side].bench.splice(i,1)[0]);
      rebuildRaw(side);
      render();
    };
    c.appendChild(play);
    row.appendChild(c);
    bench.appendChild(row);
  });

  if(state[side].bench.length===0){ bench.innerHTML="<div class='muted'>No bench players.</div>"; }
}

function renderSubPanel(side){
  var panel = document.getElementById("sub" + (side === "left" ? "Left" : "Right") + "Panel");
  panel.innerHTML = "";
  if(!state[side].subOpen) return;
  if(state[side].selected === null || !state[side].lineup[state[side].selected]){
    panel.innerHTML = "<div class='sub-panel'><div class='muted'>Select a highlighted lineup player first.</div></div>";
    return;
  }
  if(state[side].bench.length === 0){
    panel.innerHTML = "<div class='sub-panel'><div class='muted'>No bench players available.</div></div>";
    return;
  }
  var wrap = document.createElement("div");
  wrap.className = "sub-panel";
  var prompt = document.createElement("div");
  prompt.innerHTML = "Choose a bench player to swap with <strong>" + textOf(state[side].lineup[state[side].selected]) + "</strong>.";
  wrap.appendChild(prompt);

  state[side].bench.forEach(function(p, benchIndex){
    var option = document.createElement("div");
    option.className = "sub-option";

    var label = document.createElement("div");
    label.textContent = textOf(p);
    option.appendChild(label);

    var btn = document.createElement("button");
    btn.className = "small";
    btn.textContent = "Swap";
    btn.onclick = function(){
      var lineIndex = state[side].selected;
      var lineupPlayer = state[side].lineup[lineIndex];
      state[side].lineup[lineIndex] = state[side].bench[benchIndex];
      state[side].bench[benchIndex] = lineupPlayer;
      state[side].subOpen = false;
      rebuildRaw(side);
      render();
    };
    option.appendChild(btn);
    wrap.appendChild(option);
  });

  var cancel = document.createElement("button");
  cancel.className = "small";
  cancel.style.marginTop = "10px";
  cancel.textContent = "Cancel";
  cancel.onclick = function(){
    state[side].subOpen = false;
    render();
  };
  wrap.appendChild(cancel);
  panel.appendChild(wrap);
}

function renderGame(){
  document.getElementById("gameLeftTitle").textContent=state.left.name;
  document.getElementById("gameRightTitle").textContent=state.right.name;

  var gl=document.getElementById("gameLeftLineup");
  var gr=document.getElementById("gameRightLineup");
  var bl=document.getElementById("gameLeftBench");
  var br=document.getElementById("gameRightBench");

  gl.innerHTML=""; gr.innerHTML=""; bl.innerHTML=""; br.innerHTML="";

  state.left.lineup.forEach(function(p,i){
    var btn=document.createElement("button");
    btn.className="game-player"+(state.left.selected===i?" selected":"");
    btn.innerHTML="<span class='num'>"+p.num+"</span> <span class='name'>"+p.name+"</span>";
    btn.onclick=function(){ state.left.selected=i; render(); };
    gl.appendChild(btn);
  });

  state.right.lineup.forEach(function(p,i){
    var btn=document.createElement("button");
    btn.className="game-player"+(state.right.selected===i?" selected":"");
    btn.innerHTML="<span class='num'>"+p.num+"</span> <span class='name'>"+p.name+"</span>";
    btn.onclick=function(){ state.right.selected=i; render(); };
    gr.appendChild(btn);
  });

  state.left.bench.forEach(function(p){
    var chip=document.createElement("div");
    chip.className="chip";
    chip.textContent=textOf(p);
    bl.appendChild(chip);
  });

  state.right.bench.forEach(function(p){
    var chip=document.createElement("div");
    chip.className="chip";
    chip.textContent=textOf(p);
    br.appendChild(chip);
  });

  if(state.left.bench.length===0){ bl.innerHTML="<div class='muted'>No bench players.</div>"; }
  if(state.right.bench.length===0){ br.innerHTML="<div class='muted'>No bench players.</div>"; }

  renderSubPanel("left");
  renderSubPanel("right");
}

function render(){
  state.left.name=document.getElementById("leftName").value.trim() || "Home Team";
  state.right.name=document.getElementById("rightName").value.trim() || "Guest Team";
  state.left.raw=document.getElementById("leftText").value;
  state.right.raw=document.getElementById("rightText").value;
  renderSide("left");
  renderSide("right");
  renderGame();
  saveState();
}

function loadSide(side){
  var text=document.getElementById(side+"Text").value;
  state[side].lineup=parse(text);
  state[side].bench=[];
  state[side].selected=null;
  state[side].subOpen=false;
  state[side].name=document.getElementById(side+"Name").value.trim() || (side==="left"?"Home Team":"Guest Team");
  state[side].raw=text;
  render();
}

document.getElementById("leftLoad").onclick=function(){ loadSide("left"); };
document.getElementById("rightLoad").onclick=function(){ loadSide("right"); };
document.getElementById("leftName").addEventListener("input",render);
document.getElementById("rightName").addEventListener("input",render);
document.getElementById("leftText").addEventListener("input",saveState);
document.getElementById("rightText").addEventListener("input",saveState);
document.getElementById("enterGameMode").onclick=function(){ document.body.classList.add("game"); };
document.getElementById("exitGameMode").onclick=function(){ document.body.classList.remove("game"); };

document.getElementById("subLeftBtn").onclick=function(){
  state.left.subOpen = !state.left.subOpen;
  state.right.subOpen = false;
  render();
};
document.getElementById("subRightBtn").onclick=function(){
  state.right.subOpen = !state.right.subOpen;
  state.left.subOpen = false;
  render();
};

if(loadSavedState()){
  applyStateToInputs();
  state.left.lineup = Array.isArray(state.left.lineup) ? state.left.lineup : parse(state.left.raw || "");
  state.right.lineup = Array.isArray(state.right.lineup) ? state.right.lineup : parse(state.right.raw || "");
  state.left.bench = Array.isArray(state.left.bench) ? state.left.bench : [];
  state.right.bench = Array.isArray(state.right.bench) ? state.right.bench : [];
  state.left.selected = (typeof state.left.selected === "number") ? state.left.selected : null;
  state.right.selected = (typeof state.right.selected === "number") ? state.right.selected : null;
  state.left.subOpen = false;
  state.right.subOpen = false;
  render();
}else{
  state.left.lineup = parse(state.left.raw);
  state.right.lineup = parse(state.right.raw);
  applyStateToInputs();
  render();
}
})();
</script>

</body>
</html>
